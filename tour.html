    <section id="tour" class="page-section">
        <h2 class="section-title">Book a Virtual Tour</h2>
        <div class="form-section">
            <form action="#" method="POST">
                <div class="form-group"><label for="fname">First Name:</label><input type="text" id="fname" name="fname" required placeholder="Ahmed"></div>
                <div class="form-group"><label for="email">Email Address:</label><input type="email" id="email" name="email" required placeholder="ahmed@example.com"></div>
                <div class="form-group"><label>Preferred Date:</label><input type="date" name="date" required></div>
                <div class="form-group"><label for="package">Select Package:</label>
                    <select id="package" name="package">
                        <option value="standard">Standard - Giza Pyramids (Free)</option>
                        <option value="premium">Premium - Luxor & Aswan ($10)</option>
                        <option value="vip">VIP - Full Kingdom Access ($25)</option>
                    </select>
                </div>
                <div class="form-group"><label>Extras (Checkboxes):</label><br>
                    <input type="checkbox" id="vr" name="vr" value="yes" style="width: auto;"> <label for="vr" style="display:inline;">Send VR Headset</label><br>
                    <input type="checkbox" id="guide" name="guide" value="yes" style="width: auto;"> <label for="guide" style="display:inline;">Include Audio Guide</label>
                </div>
                <div class="form-group"><label for="message">Additional Notes:</label><textarea id="message" name="message" rows="4" placeholder="Any special requests?"></textarea></div>
                <button type="submit">Confirm Booking</button>
            </form>
        </div>
    </section>
